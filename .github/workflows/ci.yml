name: CI

on:
  push:
    branches:
      - master
      - dev
    paths:
      - "src/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - master
      - dev

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('src/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore ./src/StyleCopPlus.Test/StyleCopPlus.Test.csproj

      - name: Build analyzer
        run: dotnet build ./src/StyleCopPlus.Test/StyleCopPlus.Test.csproj --no-restore --configuration Debug

      - name: Run tests
        run: dotnet test --no-build --configuration Debug --verbosity normal
